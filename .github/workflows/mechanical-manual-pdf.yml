name: Mechanical Manual PDF

on:
  push:
    branches: [main]
    paths:
      - "Docs/Mechanical/**"
      - "Chassis/Photos/**"
      - "Chassis/Artwork/**"
      - "tools/gen_mechanical_chassis_photos.py"
      - "tools/gen_hardware_assets_csv.py"
      - "tools/build_mechanical_manual_pdf.py"
      - "tools/manual_pdf.py"
      - ".github/workflows/mechanical-manual-pdf.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended img2pdf qpdf

      - name: Build mechanical manual PDF
        run: python3 tools/build_mechanical_manual_pdf.py

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Docs/Mechanical/Maxx-Steele-Mechanical-Manual.pdf
          if git diff --staged --quiet; then
            echo "PDF is already up to date."
            exit 0
          fi
          git commit -m "Update Mechanical Manual PDF [skip ci]"
          git push
