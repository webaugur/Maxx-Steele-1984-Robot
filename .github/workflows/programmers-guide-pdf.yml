name: Programmers Guide PDF

on:
  push:
    branches: [main]
    paths:
      - "ProgrammersGuide/*.md"
      - "tools/build_programmers_guide_pdf.py"
      - ".github/workflows/programmers-guide-pdf.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended

      - name: Build programmers guide PDF
        run: python3 tools/build_programmers_guide_pdf.py

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ProgrammersGuide/Maxx-Steele-Programmers-Reference.pdf
          if git diff --staged --quiet; then
            echo "PDF is already up to date."
            exit 0
          fi
          git commit -m "Update Programmers Guide PDF [skip ci]"
          git push
